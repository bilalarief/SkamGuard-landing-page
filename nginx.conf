server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets with content-hash busting
    # Vite generates hashed filenames (e.g., index-abc123.js)
    # so aggressive caching is safe and will auto-bust on new deploys
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Prevent caching of index.html so new deployments are picked up immediately
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # Health check for Cloud Run
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
