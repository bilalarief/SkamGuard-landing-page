steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/skamguard-landing-page:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/skamguard-landing-page:latest'
      - '.'

  # Step 2: Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/skamguard-landing-page'

  # Step 3: Deploy to Cloud Run with the latest image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'skamguard-landing-page'
      - '--image'
      - 'gcr.io/$PROJECT_ID/skamguard-landing-page:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/skamguard-landing-page:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/skamguard-landing-page:latest'
